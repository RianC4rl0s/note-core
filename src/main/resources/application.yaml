spring:
  application:
    name: note-core

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    locations: classpath:db/migration/2026/02

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-32-bytes-long-for-hmac-sha256}
  access-token-expiration: 900000       # 15 minutes
  refresh-token-expiration: 604800000   # 7 days
